<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sainav Ultimate Creator Studio</title>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>
<style>
body{margin:0;background:#0d0d0d;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;color:white;}
.phone{width:400px;height:830px;background:#181818;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px black;position:relative;}
.header{background:#222;padding:14px;text-align:center;font-weight:bold;}
.preview{flex:1;background:black;display:flex;justify-content:center;align-items:center;position:relative;}
canvas{width:100%;height:100%;background:black;}
.timeline{height:100px;background:#101010;overflow-x:auto;white-space:nowrap;padding:10px;}
.clip{width:80px;height:60px;background:#333;display:inline-block;margin-right:8px;border-radius:6px;cursor:pointer;}
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;background:#1a1a1a;}
button{padding:10px;border:none;border-radius:8px;background:#ff2d55;color:white;font-weight:bold;cursor:pointer;}
button:hover{background:#ff4c6a;}
.status{font-size:12px;text-align:center;padding:6px;background:#111;}
#thankYouPopup{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;text-align:center;color:white;font-size:24px;padding:20px;box-sizing:border-box;z-index:100;border-radius:20px;}
#thankYouPopup button{margin-top:20px;padding:10px 20px;border:none;border-radius:8px;background:#ff2d55;color:white;font-weight:bold;cursor:pointer;}
#thankYouPopup button:hover{background:#ff4c6a;}
</style>
</head>
<body>

<div class="phone">
<div class="header">🎬 Sainav Ultimate Creator Studio</div>

<div class="preview">
<canvas id="canvas"></canvas>

<!-- Thank You Popup -->
<div id="thankYouPopup">
<p>Thank You For Using<br><b>Sainav Recorder and Editor</b><br>Thank you!</p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<div class="controls">
<button onclick="startScreen()">Screen</button>
<button onclick="startRecording()">Record</button>
<button onclick="stopRecording()">Stop</button>
<button onclick="importVideo()">Import</button>
<button onclick="addText()">Add Text</button>
<button onclick="clearText()">Clear</button>
<button onclick="addClip()">Add Clip</button>
<button onclick="trimClip()">Trim</button>
<button onclick="addAudio()">Add Music</button>
<button onclick="downloadMP4()">Download MP4</button>
</div>

<div class="timeline" id="timeline"></div>
<div class="status" id="status">Ready</div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const RECORD_WIDTH=1280, RECORD_HEIGHT=720;
canvas.width=RECORD_WIDTH; canvas.height=RECORD_HEIGHT;

let video=document.createElement("video"); video.crossOrigin="anonymous";
let stream, recorder, chunks=[], clips=[];
let text="", textX=300, textY=100, dragging=false, currentClipIndex=-1;
let audioTracks=[];

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(video.srcObject){ctx.drawImage(video,0,0,canvas.width,canvas.height);}
else if(video.src){ctx.drawImage(video,0,0,canvas.width,canvas.height);}
if(text){ctx.font="72px Arial"; ctx.fillStyle="white"; ctx.fillText(text,textX,textY);}
requestAnimationFrame(draw);
}
draw();

// Screen
async function startScreen(){stream=await navigator.mediaDevices.getDisplayMedia({video:true}); video.srcObject=stream; video.play(); document.getElementById("status").innerText="Screen ready";}

// Recording
function startRecording(){chunks=[]; let canvasStream=canvas.captureStream(30); recorder=new MediaRecorder(canvasStream,{mimeType:"video/webm; codecs=vp9"}); recorder.ondataavailable=e=>{chunks.push(e.data)}; recorder.start(); document.getElementById("status").innerText="Recording...";}
function stopRecording(){recorder.stop(); recorder.onstop=()=>{
let blob=new Blob(chunks,{type:"video/webm"}); let url=URL.createObjectURL(blob);
video.srcObject=null; video.src=url; video.controls=true; video.play(); addClip(url); document.getElementById("status").innerText="Recording saved";
}}

// Text
function addText(){text=prompt("Enter text");}
function clearText(){text="";}

// Timeline & Clips
function addClip(url=null){let clip=document.createElement("div"); clip.className="clip"; clip.onclick=()=>{playClip(clips.indexOf(clip))}; document.getElementById("timeline").appendChild(clip); clips.push(clip); if(url) clip.dataset.url=url;}
function playClip(index){currentClipIndex=index; let clip=clips[index]; if(clip.dataset.url){video.src=clip.dataset.url; video.play(); document.getElementById("status").innerText="Playing clip "+(index+1);}}
function trimClip(){alert("Trim placeholder");}

// Import Video
function importVideo(){let input=document.createElement("input"); input.type="file"; input.accept="video/*"; input.onchange=e=>{let file=e.target.files[0]; let url=URL.createObjectURL(file); video.src=url; video.play(); addClip(url); document.getElementById("status").innerText="Video imported";}; input.click();}

// Add Audio
function addAudio(){let input=document.createElement("input"); input.type="file"; input.accept="audio/*"; input.onchange=e=>{let file=e.target.files[0]; let url=URL.createObjectURL(file); audioTracks.push(url); document.getElementById("status").innerText="Audio added";}; input.click();}

// Download MP4 using FFmpeg.js
async function downloadMP4(){
document.getElementById("status").innerText="Exporting MP4...";
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log:true });
await ffmpeg.load();
let webmBlob=new Blob(chunks,{type:"video/webm"});
ffmpeg.FS('writeFile','input.webm',await fetchFile(webmBlob));
let cmd=['-i','input.webm'];
for(let i=0;i<audioTracks.length;i++){ cmd.push('-i',audioTracks[i]);}
cmd.push('-c:v','copy','-c:a','aac','output.mp4');
await ffmpeg.run(...cmd);
const data=ffmpeg.FS('readFile','output.mp4');
const url=URL.createObjectURL(new Blob([data.buffer],{type:'video/mp4'}));
let a=document.createElement('a'); a.href=url; a.download='video.mp4'; a.click();
showPopup(); document.getElementById("status").innerText="MP4 Exported!";
}

// Popup
function showPopup(){document.getElementById("thankYouPopup").style.display="flex";}
function closePopup(){document.getElementById("thankYouPopup").style.display="none";}

// Drag Text
canvas.addEventListener("mousedown",e=>{let rect=canvas.getBoundingClientRect(); let x=e.clientX-rect.left; let y=e.clientY-rect.top; if(x>textX-150 && x<textX+150 && y>textY-60 && y<textY+60){dragging=true;}});
canvas.addEventListener("mousemove",e=>{if(dragging){let rect=canvas.getBoundingClientRect(); textX=(e.clientX-rect.left)*(RECORD_WIDTH/canvas.clientWidth); textY=(e.clientY-rect.top)*(RECORD_HEIGHT/canvas.clientHeight);}});
canvas.addEventListener("mouseup",()=>{dragging=false;});
</script>

</body>
</html>
